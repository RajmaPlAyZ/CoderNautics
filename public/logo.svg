<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle for the helmet -->
  <circle cx="20" cy="20" r="18" fill="#1e3a8a" stroke="#1e3a8a" stroke-width="2"/>
  
  <!-- Helmet visor area -->
  <ellipse cx="20" cy="20" rx="12" ry="10" fill="white"/>
  
  <!-- Coding symbols inside visor -->
  <text x="12" y="18" font-family="monospace" font-size="8" font-weight="bold" fill="#1e3a8a">&lt;</text>
  <text x="20" y="18" font-family="monospace" font-size="8" font-weight="bold" fill="#1e3a8a">?</text>
  <text x="28" y="18" font-family="monospace" font-size="8" font-weight="bold" fill="#1e3a8a">&gt;</text>
  
  <!-- Orbital ring -->
  <ellipse cx="20" cy="20" rx="22" ry="8" fill="none" stroke="#1e3a8a" stroke-width="3"/>
  
  <!-- Planet/moon on the ring -->
  <circle cx="42" cy="20" r="3" fill="#1e3a8a"/>
  
  <!-- Stars/sparkles -->
  <g fill="#1e3a8a">
    <path d="M8 8 L10 12 L14 10 L10 14 L8 18 L6 14 L2 10 L6 12 Z"/>
    <path d="M32 6 L33 8 L35 7 L33 9 L32 11 L31 9 L29 7 L31 8 Z"/>
    <path d="M6 30 L7 32 L9 31 L7 33 L6 35 L5 33 L3 31 L5 32 Z"/>
    <path d="M34 32 L35 34 L37 33 L35 35 L34 37 L33 35 L31 33 L33 34 Z"/>
  </g>
</svg>
